<VirtualHost *:80>
    DocumentRoot /var/www/html/web

    <Directory /var/www/html>
        Require all granted
        AllowOverride all
    </Directory>

    php_admin_value include_path "/var/www/html/"

    # Ruta correcta del vhost.conf
    Include /var/www/html/config/vhost.conf
</VirtualHost>

